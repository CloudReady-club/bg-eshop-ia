version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      # Mount directory for MongoDB data storage
      - mongodb_data:/data/db
      # Mount directory for MongoDB config files
      - mongodb_config:/data/configdb
    networks:
      - eshop-network
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb-container:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    networks:
      - eshop-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  eshop-network:
    driver: bridge
