services:
   mongod:
      image: mongodb/mongodb-community-server:latest
      container_name: mongod-community
      command: >-
         mongod
         --config /etc/mongod.conf
         --replSetMember=mongod.search-community:27017
      ports:
         - 27017:27017
      extra_hosts:
         - "host.docker.internal:host-gateway"
      volumes:
         - mongod_data:/data/db
         - ./config/mongod.conf:/etc/mongod.conf:ro
         - ./config/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
      networks:
          search-community:
            aliases:
                - mongod.search-community


   mongot:
      image: mongodb/mongodb-community-search:latest
      container_name: mongot-community-pupr
      networks:
          search-community:
            aliases:
                - mongot.search-community
      volumes:
         - mongot_data:/data/mongot
         - ./config/mongot.conf:/mongot-community/config.default.yml
         - ./config/pwfile.pwd:/mongot-community/pwfile.pwd
      depends_on:
         - mongod
      ports:
         - 27028:27028  # Query server port from config
         - 9946:9946    # Metrics port from config
   mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongotUser:mongotPassword@mongod:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    networks:
          search-community:
            aliases:
                - mongo-express.search-community

volumes:
  mongod_data:
  mongot_data:

networks:
   search-community:
      name: search-community
      external: true  # Use an external network if it exists. Comment this line if you want to create a new network.
